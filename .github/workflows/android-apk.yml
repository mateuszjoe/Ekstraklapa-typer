name: Android APK

on:
  workflow_dispatch:
    inputs:
      task:
        description: Operacja do wykonania
        required: true
        default: build
        type: choice
        options:
          - build
          - generate-signing-key

permissions:
  contents: read

jobs:
  generate-signing-key:
    if: inputs.task == 'generate-signing-key'
    runs-on: ubuntu-latest
    steps:
      - name: Skonfiguruj JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Wygeneruj klucz wydaniowy
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          test -n "$KEYSTORE_PASSWORD"
          keytool -genkeypair -v \
            -keystore ekstraklapa-typer-release.jks \
            -storetype JKS \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -alias ekstraklapa_typer \
            -keyalg RSA \
            -keysize 3072 \
            -sigalg SHA256withRSA \
            -validity 10000 \
            -dname "CN=Ekstraklapa Typer, OU=Android, O=Ekstraklapa Typer, L=Warszawa, C=PL"

      - name: Zachowaj klucz do jednorazowego pobrania
        uses: actions/upload-artifact@v4
        with:
          name: android-release-signing-key
          path: ekstraklapa-typer-release.jks
          if-no-files-found: error
          retention-days: 1

  build:
    if: inputs.task == 'build'
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Skonfiguruj Android SDK
        uses: android-actions/setup-android@v3

      - name: Zainstaluj platformę Android
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Skonfiguruj Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Odtwórz klucz podpisujący
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/ekstraklapa-typer-release.jks"

      - name: Zbuduj podpisany APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/ekstraklapa-typer-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ekstraklapa_typer
        run: gradle --no-daemon --stacktrace :app:assembleRelease

      - name: Zweryfikuj i opisz APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk release/Ekstraklapa-Typer-v1.0.1.apk
          {
            echo "Typer v1.0.1"
            sha256sum release/Ekstraklapa-Typer-v1.0.1.apk
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs release/Ekstraklapa-Typer-v1.0.1.apk
            "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging release/Ekstraklapa-Typer-v1.0.1.apk | grep -E "^(package:|application-label:)"
          } > release/apk-info.txt 2>&1
          cat release/apk-info.txt

      - name: Opublikuj artefakt
        uses: actions/upload-artifact@v4
        with:
          name: ekstraklapa-typer-android-v1.0.1
          path: release/
          if-no-files-found: error
          retention-days: 30
